<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="基于豆包语音合成大模型 2.0 的长文本异步语音合成网页。"
    />
    <title>豆包长文本语音合成工作台</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#textInput">跳到文本输入框</a>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div>
            <p class="eyebrow">Doubao TTS 2.0</p>
            <h1>长文本语音合成工作台</h1>
          </div>
        </div>

        <div class="topbar-meta" aria-label="当前接口信息">
          <span class="status-dot"></span>
          <span>异步长文本接口</span>
          <strong>seed-tts-2.0</strong>
        </div>
      </header>

      <main class="studio-grid">
        <section class="composer" aria-labelledby="composerTitle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Input</p>
              <h2 id="composerTitle">粘贴或输入长文本</h2>
            </div>
            <div class="tool-buttons" aria-label="文本工具">
              <button class="icon-button" type="button" id="pasteButton" title="从剪贴板粘贴">
                <i data-lucide="clipboard-paste" aria-hidden="true"></i>
                <span>粘贴</span>
              </button>
              <button class="icon-button ghost" type="button" id="clearButton" title="清空文本">
                <i data-lucide="trash-2" aria-hidden="true"></i>
                <span>清空</span>
              </button>
            </div>
          </div>

          <div class="text-surface">
            <textarea
              id="textInput"
              maxlength="100000"
              spellcheck="false"
              placeholder="在这里粘贴要合成的文本，最多 100000 个字符。豆包语音合成模型 2.0 音色暂不支持 SSML，请输入普通文本。"
            ></textarea>
          </div>

          <div class="composer-footer">
            <div class="metric">
              <span id="charCount">0</span>
              <small>/ 100000 字符</small>
            </div>
            <div class="metric muted">
              <span id="illegalCount">0</span>
              <small>非法控制符</small>
            </div>
          </div>
        </section>

        <aside class="control-panel" aria-label="合成设置">
          <section class="panel-section">
            <div class="section-heading compact">
              <div>
                <p class="eyebrow">Voice</p>
                <h2>音色与模型</h2>
              </div>
            </div>

            <label class="field">
              <span>音色</span>
              <select id="voiceSelect"></select>
            </label>

            <label class="field">
              <span>自定义音色 ID</span>
              <input
                id="customVoice"
                type="text"
                inputmode="text"
                placeholder="留空则使用下拉框音色"
                autocomplete="off"
              />
            </label>

            <div class="two-col">
              <label class="field">
                <span>采样率</span>
                <select id="sampleRate">
                  <option value="24000" selected>24000 Hz</option>
                  <option value="32000">32000 Hz</option>
                  <option value="44100">44100 Hz</option>
                  <option value="48000">48000 Hz</option>
                  <option value="16000">16000 Hz</option>
                </select>
              </label>

              <label class="field">
                <span>语种</span>
                <select id="languageMode">
                  <option value="auto" selected>自动识别</option>
                  <option value="zh-cn">中文为主</option>
                  <option value="crosslingual">多语种</option>
                  <option value="en">仅英文</option>
                </select>
              </label>
            </div>
          </section>

          <section class="panel-section">
            <div class="section-heading compact">
              <div>
                <p class="eyebrow">Tuning</p>
                <h2>语速与音量</h2>
              </div>
            </div>

            <label class="range-field">
              <span>语速 <strong id="speechRateValue">0</strong></span>
              <input id="speechRate" type="range" min="-50" max="100" step="1" value="0" />
            </label>

            <label class="range-field">
              <span>音量 <strong id="loudnessValue">0</strong></span>
              <input id="loudness" type="range" min="-50" max="100" step="1" value="0" />
            </label>
          </section>

          <section class="panel-section">
            <div class="section-heading compact">
              <div>
                <p class="eyebrow">Auth</p>
                <h2>接口连接</h2>
              </div>
            </div>

            <label class="field">
              <span>代理地址</span>
              <input
                id="proxyUrl"
                type="url"
                placeholder="https://your-worker.example.workers.dev"
                autocomplete="off"
              />
            </label>

            <details class="credential-details">
              <summary>没有代理时，临时输入火山凭据</summary>
              <label class="field">
                <span>App ID</span>
                <input id="appId" type="text" placeholder="your-app-id" autocomplete="off" />
              </label>
              <label class="field">
                <span>Access Key</span>
                <input
                  id="accessKey"
                  type="password"
                  placeholder="your-access-key"
                  autocomplete="off"
                />
              </label>
              <p class="microcopy">
                纯 GitHub Pages 无法隐藏密钥。公开使用建议部署代理，只在代理端保存凭据。
              </p>
            </details>
          </section>
        </aside>
      </main>

      <section class="result-dock" aria-label="合成结果">
        <div class="status-block">
          <div class="status-line">
            <span class="status-indicator" id="statusIndicator"></span>
            <div>
              <strong id="statusTitle">准备就绪</strong>
              <p id="statusDetail">输入文本并选择音色后，可以开始提交长文本合成任务。</p>
            </div>
          </div>
          <div class="progress-track" aria-hidden="true">
            <span id="progressFill"></span>
          </div>
        </div>

        <div class="audio-result" id="audioResult" hidden>
          <audio id="audioPlayer" controls preload="metadata"></audio>
          <a class="button secondary" id="downloadLink" href="#" download>
            <i data-lucide="download" aria-hidden="true"></i>
            下载音频
          </a>
          <button class="icon-button ghost" type="button" id="copyUrlButton" title="复制音频链接">
            <i data-lucide="link" aria-hidden="true"></i>
            <span>复制链接</span>
          </button>
        </div>

        <div class="dock-actions">
          <button class="button primary" type="button" id="synthesizeButton">
            <i data-lucide="audio-lines" aria-hidden="true"></i>
            语音合成
          </button>
          <button class="button subtle" type="button" id="stopButton" disabled>
            <i data-lucide="circle-stop" aria-hidden="true"></i>
            停止轮询
          </button>
        </div>
      </section>
    </div>
  </body>
</html>
